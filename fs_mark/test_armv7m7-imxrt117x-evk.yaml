# This yaml contain armv7m7-imxrt117x-evk specific fs_mark tests
test:
  type: harness
  harness: fs_mark.py
  # nightly: true

  targets:
    value: [armv7m7-imxrt117x-evk]

# Each test is independent (target reboot)
  tests:
    # empty files
    - name: fs_mark_10_emptyFiles_fillFs
      execute: fs_mark -d /fs_mark_test -s 0 -n 10 -v -S 0 -F

    - name: fs_mark_emptyFiles_4_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 4 -N 4 -s 0 -n 16 -v -S 0 -F

    - name: fs_mark_emptyFiles_10_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 10 -N 1 -s 0 -n 10 -v -S 0 -F

    - name: fs_mark_emptyFiles_25_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 25 -N 1 -s 0 -n 25 -v -S 0 -F

    # big file
    - name: fs_mark_bigFile_singleByteWrite
      execute: fs_mark -d /fs_mark_test -s 300000 -w 1 -n 1 -v -S 0

    - name: fs_mark_bigFile_allignedWrite
      execute: fs_mark -d /fs_mark_test -s 300000 -w 32 -n 1 -v -S 0

    - name: fs_mark_bigFile_notAllignedWrite
      execute: fs_mark -d /fs_mark_test -s 300000 -w 113 -n 1 -v -S 0

    - name: fs_mark_bigFile_bigWrite
      execute: fs_mark -d /fs_mark_test -s 300000 -w 1024 -n 1 -v -S 0

    # s=256 w=32
    - name: fs_mark_1_smallFile_alignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 256 -w 32 -n 1 -v -S 0 -F

    - name: fs_mark_10_smallFiles_alignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 256 -w 32 -n 10 -v -S 0 -F

    - name: fs_mark_100_smallFiles_alignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 256 -w 32 -n 100 -v -S 0 -F

    - name: fs_mark_smallFiles_alignedWrite_5_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 5 -N 20 -s 256 -w 32 -n 100 -v -S 0 -F

    - name: fs_mark_smallFiles_alignedWrite_10_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 10 -N 10 -s 256 -w 32 -n 100 -v -S 0 -F

    - name: fs_mark_smallFiles_alignedWrite_100_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 100 -N 1 -s 256 -w 32 -n 100 -v -S 0 -F

    # s=512 w=32
    - name: fs_mark_1_pageSizeFile_alignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 512 -w 32 -n 1 -v -S 0 -F

    - name: fs_mark_10_pageSizeFiles_alignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 512 -w 32 -n 10 -v -S 0 -F

    - name: fs_mark_100_pageSizeFiles_alignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 512 -w 32 -n 100 -v -S 0 -F

    - name: fs_mark_pageSizeFiles_alignedWrite_5_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 5 -N 20 -s 512 -w 32 -n 100 -v -S 0 -F

    - name: fs_mark_pageSizeFiles_alignedWrite_10_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 10 -N 10 -s 512 -w 32 -n 100 -v -S 0 -F

    - name: fs_mark_pageSizeFiles_alignedWrite_100_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 100 -N 1 -s 512 -w 32 -n 100 -v -S 0 -F
      
    # s=10000 w=32
    - name: fs_mark_1_bigFile_alignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 10000 -w 32 -n 1 -v -S 0 -F

    - name: fs_mark_10_bigFiles_alignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 10000 -w 32 -n 10 -v -S 0 -F

    - name: fs_mark_25_bigFiles_alignedWrite
      execute: fs_mark -d /fs_mark_test -s 10000 -w 32 -n 25 -v -S 0

    - name: fs_mark_bigFiles_alignedWrite_5_dirs
      execute: fs_mark -d /fs_mark_test -D 5 -N 5 -s 10000 -w 32 -n 25 -v -S 0

    - name: fs_mark_bigFiles_alignedWrite_10_dirs
      execute: fs_mark -d /fs_mark_test -D 10 -N 3 -s 10000 -w 32 -n 30 -v -S 0

    - name: fs_mark_bigFiles_alignedWrite_25_dirs
      execute: fs_mark -d /fs_mark_test -D 25 -N 1 -s 10000 -w 32 -n 25 -v -S 0

    # s=256 w=113
    - name: fs_mark_1_smallFile_notAlignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 256 -w 113 -n 1 -v -S 0 -F

    - name: fs_mark_10_smallFiles_notAlignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 256 -w 113 -n 10 -v -S 0 -F

    - name: fs_mark_100_smallFiles_notAlignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 256 -w 113 -n 100 -v -S 0 -F

    - name: fs_mark_smallFiles_notAlignedWrite_5_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 5 -N 20 -s 256 -w 113 -n 100 -v -S 0 -F

    - name: fs_mark_smallFiles_notAlignedWrite_10_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 10 -N 10 -s 256 -w 113 -n 100 -v -S 0 -F

    - name: fs_mark_smallFiles_notAlignedWrite_100_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 100 -N 1 -s 256 -w 113 -n 100 -v -S 0 -F

    # s=512 w=113
    - name: fs_mark_1_pageSizeFile_notAlignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 512 -w 113 -n 1 -v -S 0 -F

    - name: fs_mark_10_pageSizeFiles_notAlignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 512 -w 113 -n 10 -v -S 0 -F

    - name: fs_mark_100_pageSizeFiles_notAlignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 512 -w 113 -n 100 -v -S 0 -F

    - name: fs_mark_pageSizeFiles_notAlignedWrite_5_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 5 -N 20 -s 512 -w 113 -n 100 -v -S 0 -F

    - name: fs_mark_pageSizeFiles_notAlignedWrite_10_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 10 -N 10 -s 512 -w 113 -n 100 -v -S 0 -F

    - name: fs_mark_pageSizeFiles_notAlignedWrite_100_dirs_fillFs
      execute: fs_mark -d /fs_mark_test -D 100 -N 1 -s 512 -w 113 -n 100 -v -S 0 -F

    # s=10000 w=113
    - name: fs_mark_bigFile_notAlignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 10000 -w 113 -n 1 -v -S 0 -F

    - name: fs_mark_10_bigFiles_notAlignedWrite_fillFs
      execute: fs_mark -d /fs_mark_test -s 10000 -w 113 -n 10 -v -S 0 -F

    - name: fs_mark_25_bigFiles_notAlignedWrite
      execute: fs_mark -d /fs_mark_test -s 10000 -w 113 -n 25 -v -S 0

    - name: fs_mark_bigFiles_notAlignedWrite_5_dirs
      execute: fs_mark -d /fs_mark_test -D 5 -N 5 -s 10000 -w 113 -n 25 -v -S 0

    - name: fs_mark_bigFiles_notAlignedWrite_10_dirs
      execute: fs_mark -d /fs_mark_test -D 10 -N 3 -s 10000 -w 113 -n 30 -v -S 0

    - name: fs_mark_bigFiles_notAlignedWrite_25_dirs
      execute: fs_mark -d /fs_mark_test -D 25 -N 1 -s 10000 -w 113 -n 25 -v -S 0
